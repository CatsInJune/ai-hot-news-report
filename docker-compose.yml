services:
  db:
    image: postgres:16-alpine
    container_name: ai-hot-news-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_hot_news
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_hot_news"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
