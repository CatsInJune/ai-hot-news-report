name: Scheduled collect

# 定时调度交给 cron-job.org（POST workflow_dispatch），GitHub Actions schedule
# 在 :00 / :30 高峰被严重延迟（实测 2-5 小时一次），不再使用。
# - cron-job.org 准点触发 → workflow_dispatch
# - 前端顶栏 Fetch 按钮也是同一个 workflow_dispatch 入口
on:
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    # collectAll 在 runner 里直接跑，避开 Vercel 60s 限制；给个上限避免卡死
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run collect
        env:
          # 数据库
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # AI
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          CLEAN_RAW_WITH_LLM: ${{ secrets.CLEAN_RAW_WITH_LLM }}
          # 采集源
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          # 邮件通知
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          # 企业微信
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_DIGEST_MAX_LINES: ${{ secrets.WECHAT_DIGEST_MAX_LINES }}
          # Digest 窗口
          EMAIL_DIGEST_WINDOW_MS: ${{ secrets.EMAIL_DIGEST_WINDOW_MS }}
          EMAIL_DIGEST_MAX_ITEMS: ${{ secrets.EMAIL_DIGEST_MAX_ITEMS }}
        run: npm run collect
