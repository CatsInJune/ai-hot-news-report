name: Scheduled collect

on:
  schedule:
    # 每 30 分钟触发一次（GitHub Actions cron 用 UTC，高负载时可能延迟几分钟）
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    # collectAll 在 runner 里直接跑，避开 Vercel 60s 限制；给个上限避免卡死
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Debug secret integrity
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # 不会打印值，但 wc -c 不会被 mask
          echo "DEEPSEEK_API_KEY length: $(printf '%s' "${DEEPSEEK_API_KEY}" | wc -c)"
          echo "OPENROUTER_API_KEY length: $(printf '%s' "${OPENROUTER_API_KEY}" | wc -c)"
          echo "DATABASE_URL length: $(printf '%s' "${DATABASE_URL}" | wc -c)"
          # 验证 OPENROUTER_API_KEY 自身（不依赖 SDK）
          curl -s -o /tmp/or.json -w "OR /auth/key HTTP %{http_code}\n" \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            https://openrouter.ai/api/v1/auth/key || true
          head -c 200 /tmp/or.json | sed 's/sk-or-v1-[^"]*/REDACTED/g' || true; echo

      - name: Run collect
        env:
          # 数据库
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # AI
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          CLEAN_RAW_WITH_LLM: ${{ secrets.CLEAN_RAW_WITH_LLM }}
          # 采集源
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          # 邮件通知
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          # 企业微信
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_DIGEST_MAX_LINES: ${{ secrets.WECHAT_DIGEST_MAX_LINES }}
          # Digest 窗口
          EMAIL_DIGEST_WINDOW_MS: ${{ secrets.EMAIL_DIGEST_WINDOW_MS }}
          EMAIL_DIGEST_MAX_ITEMS: ${{ secrets.EMAIL_DIGEST_MAX_ITEMS }}
        run: npm run collect
