name: Scheduled collect

on:
  schedule:
    # 每 30 分钟触发一次（GitHub Actions cron 是 UTC；高负载时可能延迟几分钟）
    - cron: "*/30 * * * *"
  workflow_dispatch: # 允许在 Actions 页面手动触发

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/collect
        env:
          PROD_URL: https://ai-hot-news-report.vercel.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET secret is not set on the repo"
            exit 1
          fi
          code=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -X POST "${PROD_URL}/api/collect")
          echo "HTTP $code"
          cat /tmp/body
          test "$code" = "200"
